<!DOCTYPE html>
<html>
<head>
    <title>Find Your Next Read</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
</head>
<body>
    <main class="page">
        <section class="card">
            <h1 class="title">Find Your Next Read</h1>
            <button id="upload-button" class="upload-button" type="button">Upload Books</button>

            <section class="how-it-works">
                <h2>How it works?</h2>
                <div class="steps">
                    <article class="step">
                        <p class="step-number">1</p>
                        <p class="step-text">upload your books using a csv file</p>
                    </article>
                    <article class="step">
                        <p class="step-number">2</p>
                        <p class="step-text">choose your preferences eg,. mood , top picks.</p>
                    </article>
                    <article class="step">
                        <p class="step-number">3</p>
                        <p class="step-text">Generate and enjoy reading!</p>
                    </article>
                </div>
            </section>
        </section>
    </main>
</body>
</html>
