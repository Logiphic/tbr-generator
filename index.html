<!DOCTYPE html>
<html>
<head>
    <title>Find Your Next Read</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
</head>
<body>
    <main class="page">
        <section class="card upload-card">
            <a class="back-link" href="#" aria-label="Go back">
                <img src="https://www.figma.com/api/mcp/asset/4b1cc60d-78c6-41f1-a7ea-beb8d214945f" alt="" />
            </a>

            <h1 class="title">Upload Books</h1>

            <p class="goodreads-link-wrap">
                <a class="goodreads-link" href="#">Download csv file from Goodreads</a>
            </p>

            <div class="upload-row">
                <p class="upload-label">upload your library csv file here</p>
                <label for="library-file" class="choose-file">Choose file</label>
                <input id="library-file" type="file" accept=".csv" hidden />
            </div>

            <section class="progress-section" aria-label="Upload progress">
                <p class="progress-label">Upload progress</p>
                <div class="progress-track" role="progressbar" aria-valuenow="140" aria-valuemin="0" aria-valuemax="200">
                    <span class="progress-fill"></span>
                </div>
                <p class="progress-value">140/200</p>
            </section>
        </section>
    </main>
</body>
</html>
